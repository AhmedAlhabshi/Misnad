kind = "web"
previewPath = "/"
title = "Misnad"
version = "1.0.0"
id = "artifacts/misnad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23902

[services.development]
run = "pnpm --filter @workspace/misnad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/misnad", "run", "build" ]
publicDir = "artifacts/misnad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23902"
BASE_PATH = "/"
